# Development Environment Configuration
server.port=${SERVER_PORT:8434}

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.aerilontech.crm=DEBUG
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.jdbc.core=OFF
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=${SPRINGFRAMEWORK_WEB_LOG_LEVEL:ERROR}

# Database Configuration
spring.datasource.url=${AWS_RDS_URL}
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}
spring.jpa.properties.hibernate.default_schema=${RDS_SCHEMA}

# Error Configuration
server.error.include-message=always
server.error.include-stacktrace=always
