spring.application.name=turfclan

# Default profile comes from environment and falls back to local for developer machines.
# Override with SPRING_PROFILES_ACTIVE=dev|preprod|prod when needed.
spring.profiles.default=${SPRING_PROFILES_ACTIVE:local}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-keys-as-timestamps=false

# JWT Configuration
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1Qgc2lnbmluZyB3aXRoIEhTMjU2}
jwt.access-token-expiry-ms=${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
jwt.refresh-token-expiry-ms=${JWT_REFRESH_TOKEN_EXPIRY_MS:604800000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# AWS Credentials (using environment variables for security)
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.region.static=ap-south-1

# Enable S3 support (usually true by default if dependency is present)
spring.cloud.aws.s3.enabled=true

# Maximum total request size (for multiple images)
spring.servlet.multipart.max-request-size=10MB

# google recaptcha configuration
google.recaptcha.key.secret=${RECAPTCHA_SECRET_KEY}
google.recaptcha.url=https://www.google.com/recaptcha/api/siteverify
google.recaptcha.score-threshold=${RECAPTCHA_THRESHOLD_SCORE:0.5}

# Spring mail configuration
thymeleaf.messageSource.cache=30
spring.mail.host=${EMAIL_SERVICE_HOST}
spring.mail.port=${EMAIL_SERVICE_PORT}
spring.mail.username=${EMAIL_SERVICE_USERNAME}
spring.mail.password=${EMAIL_SERVICE_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
from.email.address=${EMAIL_FROM_ADDRESS}