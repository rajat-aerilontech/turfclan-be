# Local Environment Configuration
server.port=${SERVER_PORT:8434}

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.aerilontech.crm=DEBUG
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.jdbc.core=OFF
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=${SPRINGFRAMEWORK_WEB_LOG_LEVEL:ERROR}

# Database Configuration
spring.datasource.url=${AWS_RDS_URL:jdbc:postgresql://localhost:5432/turfclan}
spring.datasource.username=${RDS_USERNAME:aerilon_user_2}
spring.datasource.password=${RDS_PASSWORD:aerilon@123}
spring.jpa.properties.hibernate.default_schema=${RDS_SCHEMA:turfclan_schema}

# Error Configuration
server.error.include-message=always
server.error.include-stacktrace=always

# Aws Bucket Settings
spring.cloud.aws.s3.bucket=turfclan-assets