<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email</title>
    <style>
        /* Base styles for email client compatibility */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }

        /* Reset */
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f9f9f9; }

        /* Custom Styling */
        .wrapper { width: 100%; background-color: #f9f9f9; padding: 40px 0; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

        /* Header & Hero */
        .header { text-align: center; padding: 30px 20px 20px; background-color: #ffffff; }
        .header img { max-width: 80px; height: auto; }
        .hero { background-color: #fbd153; padding: 40px 20px; text-align: center; }
        .hero h1 { margin: 0; font-size: 26px; font-weight: 800; color: #111111; text-transform: uppercase; letter-spacing: -0.5px; }

        /* Body Content */
        .content { padding: 40px 40px 30px; }
        .content h2 { margin-top: 0; font-size: 20px; font-weight: 700; color: #111111; }
        .content p { font-size: 14px; line-height: 1.6; color: #444444; margin-bottom: 24px; }

        /* Call to Action */
        .cta-container { text-align: center; margin: 40px 0 20px; }
        .btn { display: inline-block; background-color: #111111; color: #fbd153 !important; text-decoration: none; font-weight: 700; font-size: 14px; padding: 16px 32px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Footer */
        .footer { background-color: #ffffff; padding: 0 40px 30px; text-align: center; border-top: 1px solid #f0f0f0; margin-top: 20px; padding-top: 30px; }
        .footer p { font-size: 13px; color: #888888; margin: 5px 0; line-height: 1.5; }

        /* Disclaimer */
        .disclaimer { background-color: #f1f1f1; padding: 15px 20px; text-align: center; font-size: 12px; color: #999999; }

        /* Mobile Responsiveness */
        @media screen and (max-width: 600px) {
            .content { padding: 30px 20px; }
            .hero h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">

        <!-- Logo Area -->
        <div class="header">
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" border="0">
                <tr>
                    <td align="center">
                        <img src="https://turfclan-assets-prod.s3.ap-south-1.amazonaws.com/public-image/logo-icon_transparent.png"
                             alt="App Logo"
                             width="80"
                             style="display: block; width: 80px; max-width: 80px; height: auto;">
                    </td>
                </tr>
            </table>
        </div>

        <!-- Hero Banner -->
        <div class="hero">
            <h1 th:text="#{email.partnerQuery.admin.hero}"></h1>
        </div>

        <!-- Message Body -->
        <div class="content">
            <h2 th:text="#{email.partnerQuery.admin.hello}"></h2>

            <p th:text="#{email.partnerQuery.admin.body}"></p>

            <p><strong th:text="#{email.partnerQuery.admin.userDetails}"></strong></p>
            <ul>
                <li><strong>Name:</strong> <span th:text="${userName}"></span></li>
                <li><strong>Brand Name:</strong> <span th:text="${brandName}"></span></li>
                <li><strong>Email or Phone Number:</strong> <span th:text="${emailOrPhone}"></span></li>
                <li><strong>Description:</strong> <span th:text="${description}"></span></li>
            </ul>

            <p style="margin-top: 40px; margin-bottom: 0;">
                <span th:text="#{email.signature.admin.regards}"></span><br>
                <strong><span th:text="#{email.signature.admin.name}"></span></strong>
            </p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p th:text="#{email.footer.admin.text1}"></p>
            <p th:text="#{email.footer.admin.text2}"></p>
            <p th:utext="#{email.footer.admin.text3}"></p>
        </div>

        <!-- Automated Email Disclaimer -->
        <div class="disclaimer" th:text="#{email.admin.disclaimer}"></div>

    </div>
</div>
</body>
</html>
