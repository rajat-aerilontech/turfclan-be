name: Build and Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - qa
          - develop

permissions:
  contents: read

env:
  APP_NAME: turfclan-be
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Resolve project version
        id: resolve_version
        run: echo "IMAGE_TAG=$(./gradlew -q printVersion)" >> $GITHUB_ENV
      - name: Build and run tests
        run: ./gradlew clean build --no-daemon

      - name: Remove existing Docker image
        run: docker rmi ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} || true

      - name: Build Docker image
        run: docker build --no-cache -t ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build --no-cache -t ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Push image to Docker Hub
        run: |
          docker tag ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} ${{ env.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} ${{ env.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest

      - name: Upload application jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turfclan-application-jar
          path: application/build/libs/*.jar
          if-no-files-found: error

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Spring Profile
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "SPRING_PROFILES_ACTIVE=prod" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" == "staging" ]; then
            echo "SPRING_PROFILES_ACTIVE=preprod" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" == "qa" ]; then
            echo "SPRING_PROFILES_ACTIVE=qa" >> $GITHUB_ENV
          else
            echo "SPRING_PROFILES_ACTIVE=dev" >> $GITHUB_ENV
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Verify PostgreSQL is reachable
            timeout 5 bash -c '</dev/tcp/127.0.0.1/5432' && echo "PostgreSQL is reachable on localhost:5432"
            
            # Enable PostGIS extension (in case the Docker image didn't catch it)
            echo "Ensuring PostGIS extension in ${{ secrets.DATABASE_NAME }}..."
            export PGPASSWORD="${{ secrets.RDS_PASSWORD }}"
            psql -h 127.0.0.1 -U "${{ secrets.RDS_USERNAME }}" -d "${{ secrets.DATABASE_NAME }}" -c "CREATE EXTENSION IF NOT EXISTS postgis;"
            
            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pull latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:$IMAGE_TAG
            
            # Stop and remove existing app container (do not touch the DB container)
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true
            
            # Run the new app container
            docker run -d \
              --name ${{ env.APP_NAME }} \
              --restart unless-stopped \
              --network host \
              -e SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE \
              -e SERVER_PORT=8434 \
              -e ALLOWED_ORIGIN="*" \
              -e SPRINGFRAMEWORK_WEB_LOG_LEVEL="${{ vars.SPRINGFRAMEWORK_WEB_LOG_LEVEL }}" \
              -e AWS_RDS_URL="jdbc:postgresql://127.0.0.1:5432/${{ secrets.DATABASE_NAME }}" \
              -e RDS_USERNAME="${{ secrets.RDS_USERNAME }}" \
              -e RDS_PASSWORD="${{ secrets.RDS_PASSWORD }}" \
              -e RDS_SCHEMA="${{ secrets.RDS_SCHEMA }}" \
              -e APP_COPYRIGHT="${{ secrets.APP_COPYRIGHT }}" \
              -e AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
              -e AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e RECAPTCHA_SECRET_KEY="${{ secrets.RECAPTCHA_SECRET_KEY }}" \
              -e RECAPTCHA_THRESHOLD_SCORE="0.5" \
              -e EMAIL_SERVICE_HOST="${{ secrets.EMAIL_SERVICE_HOST }}" \
              -e EMAIL_SERVICE_PORT="${{ secrets.EMAIL_SERVICE_PORT }}" \
              -e EMAIL_SERVICE_USERNAME="${{ secrets.EMAIL_SERVICE_USERNAME }}" \
              -e EMAIL_SERVICE_PASSWORD="${{ secrets.EMAIL_SERVICE_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:$IMAGE_TAG
