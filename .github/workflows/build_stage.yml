name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development

permissions:
  contents: read

env:
  APP_NAME: turfclan-be
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew clean build --no-daemon

      - name: Remove existing Docker image
        run: docker rmi ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} || true

      - name: Build Docker image
        run: docker build --no-cache -t ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker tag ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest

      - name: Upload application jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turfclan-application-jar
          path: application/build/libs/*.jar
          if-no-files-found: error

  deploy:
    name: Deploy
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preprod' || github.ref == 'refs/heads/develop')
    runs-on: [self-hosted, aws-ec2-turfclan]
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Remove existing Docker image
        run: docker rmi "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}" || true

      - name: Pull image from Docker Hub
        run: docker pull "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"

      # --- New: Ensure PostGIS is installed and enabled on the host DB ---
      - name: Install and Enable PostGIS on Host
        run: |
          # 1. Check if postgis is already installed to save time
          if ! command -v psql &> /dev/null || ! dpkg -s postgis &> /dev/null; then
            echo "PostGIS not found. Installing..."
            sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y postgis postgresql-14-postgis-3
          else
            echo "PostGIS is already installed. Skipping installation."
          fi

          # 2. Always ensure the extension is enabled in the specific DB
          echo "Enabling PostGIS extension in ${{ secrets.DATABASE_NAME }}..."
          export PGPASSWORD="${{ secrets.RDS_PASSWORD }}"
          psql -h 127.0.0.1 -U "${{ secrets.RDS_USERNAME }}" -d "${{ secrets.DATABASE_NAME }}" -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -h 127.0.0.1 -U "${{ secrets.RDS_USERNAME }}" -d "${{ secrets.DATABASE_NAME }}" -c "SELECT postgis_full_version();"

      - name: Verify local PostgreSQL is reachable
        run: |
          timeout 5 bash -c '</dev/tcp/127.0.0.1/5432'
          echo "PostgreSQL is reachable on localhost:5432"

      - name: Restart container
        run: |
          docker stop "${{ env.APP_NAME }}" || true
          docker rm "${{ env.APP_NAME }}" || true
          docker run -d \
            --name "${{ env.APP_NAME }}" \
            --restart unless-stopped \
            --network host \
            -e SPRING_PROFILES_ACTIVE="${{ vars.SPRING_PROFILES_ACTIVE }}" \
            -e SERVER_PORT="8434" \
            -e ALLOWED_ORIGIN="*" \
            -e LOG_LEVEL="${{ vars.LOG_LEVEL }}" \
            -e SPRINGFRAMEWORK_WEB_LOG_LEVEL="${{ vars.SPRINGFRAMEWORK_WEB_LOG_LEVEL }}" \
            -e AWS_RDS_URL="jdbc:postgresql://127.0.0.1:5432/${{ secrets.DATABASE_NAME }}" \
            -e RDS_USERNAME="${{ secrets.RDS_USERNAME }}" \
            -e RDS_PASSWORD="${{ secrets.RDS_PASSWORD }}" \
            -e RDS_SCHEMA="${{ secrets.RDS_DATABASE_SCHEMA }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
